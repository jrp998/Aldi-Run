<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#001E5A">
<title>Aldi Run</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --navy:#001E5A; --navy-deep:#00133C;
  --cyan:#1CBBEE; --orange:#FF7800; --red:#D50029; --yellow:#FFC800;
  --paper:#F4F7FB; --card:#FFFFFF; --ink:#12203B; --ink-soft:#5A6A85;
  --line:#E2E9F2; --green:#178841; --wool:#178841; --coles:#D50029;
  --rail:36px; --bottombar-h:96px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{min-height:100%;overflow-x:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--paper); color:var(--ink);
  font-size:17px; line-height:1.35;
  padding-bottom:calc(var(--bottombar-h, 96px) + 20px + env(safe-area-inset-bottom));
  overscroll-behavior-y:contain;
}
button{font:inherit;border:0;background:none;cursor:pointer;color:inherit}
input,textarea,select{font:inherit;color:inherit}

/* ---------- Header ---------- */
header{
  position:sticky;top:0;z-index:40;
  background:var(--navy);color:#fff;
  padding:calc(10px + env(safe-area-inset-top)) 16px 0;
}
.brandrow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.wordmark{font-size:24px;font-weight:900;letter-spacing:-0.5px;font-style:italic}
.wordmark span{color:var(--cyan)}
.headright{display:flex;align-items:center;gap:10px}
.subtotal{font-size:13px;font-weight:700;color:#BFD3F5;font-variant-numeric:tabular-nums;text-align:right}
.subtotal strong{color:var(--yellow);font-size:15px}
.gear{font-size:20px;padding:4px 2px;color:#BFD3F5}
.syncpill{font-size:10px;font-weight:900;letter-spacing:.4px;color:#fff;border-radius:999px;padding:3px 9px;background:#8FA5CE;text-transform:uppercase}
.stripes{display:flex;height:4px;margin:10px -16px 0;}
.stripes i{flex:1}
.stripes i:nth-child(1){background:var(--cyan)}
.stripes i:nth-child(2){background:var(--orange)}
.stripes i:nth-child(3){background:var(--red)}
.stripes i:nth-child(4){background:var(--yellow)}
.tabs{display:flex;background:var(--navy-deep);margin:0 -16px;}
.tabs button{
  flex:1;padding:12px 0 11px;color:#8FA5CE;font-weight:800;font-size:15px;
  border-bottom:3px solid transparent;letter-spacing:0.3px;
}
.tabs button.on{color:#fff;border-bottom-color:var(--orange)}

/* in-app alert banner */
.banner{
  margin:10px 12px 0;background:#FFF6E4;border:1.5px solid #F4D48A;border-radius:14px;
  padding:11px 13px;font-size:14.5px;font-weight:600;color:#6B4E00;
  display:flex;align-items:center;gap:10px;
}
.banner.late{background:#FDEBEE;border-color:#F2B6C1;color:#7A0018}
.banner .dismiss{margin-left:auto;font-weight:900;color:inherit;opacity:.6;padding:4px 6px;flex-shrink:0}

/* ---------- Add bar ---------- */
.addbar{
  position:sticky;top:0;z-index:30;
  padding:10px 12px 6px;background:linear-gradient(var(--paper) 75%,rgba(244,247,251,0));
}
.addrow{display:flex;gap:8px}
.addrow input{
  flex:1;border:2px solid var(--line);border-radius:14px;background:#fff;
  padding:13px 14px;font-size:17px;outline:none;min-width:0;
}
.addrow input:focus{border-color:var(--cyan)}
.addrow .go{
  background:var(--orange);color:#fff;font-weight:900;font-size:17px;
  border-radius:14px;padding:0 20px;flex-shrink:0;
}
.addrow .go:active{transform:scale(.96)}
.sugg{display:flex;gap:6px;overflow-x:auto;padding:8px 2px 2px;scrollbar-width:none}
.sugg::-webkit-scrollbar{display:none}
.sugg button{
  background:#fff;border:1.5px solid var(--line);border-radius:999px;
  padding:7px 13px;font-size:15px;font-weight:600;white-space:nowrap;color:var(--ink)
}
.sugg button:active{background:#EAF6FD;border-color:var(--cyan)}
.regwrap{padding:2px 2px 0}
.reghead{font-size:11px;font-weight:900;letter-spacing:.7px;text-transform:uppercase;color:var(--ink-soft);margin:6px 0 6px 2px;display:flex;align-items:center;gap:6px}
.regchips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.regchips::-webkit-scrollbar{display:none}
.regchips button{flex-shrink:0;background:#fff;border:1.5px solid var(--line);border-radius:999px;padding:8px 13px;font-size:14.5px;font-weight:700;white-space:nowrap;color:var(--ink);display:flex;align-items:center;gap:5px}
.regchips button:active{background:#EAF6FD;border-color:var(--cyan)}
.regchips button.on{background:#E4F7EC;border-color:var(--green);color:#0E6A33}
.regchips button .add{font-weight:900;color:var(--green)}

/* ---------- Route list ---------- */
.list{padding:2px 12px 8px 8px}
.aisle{display:flex}
.railcol{width:var(--rail);flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.railline{width:3px;flex:1;background:#C9D6E8}
.aisle:last-child .railcol .railline.below{background:transparent}
.node{
  width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;
  font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:0 0 0 3px var(--paper);
}
.node.done{background:var(--green)}
.aislebody{flex:1;min-width:0;padding:0 0 14px 8px}
.aislehead{display:flex;align-items:center;gap:7px;padding:4px 0 7px}
.aislehead h2{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:0.9px;color:var(--navy)}
.aislehead .count{font-size:12px;font-weight:700;color:var(--ink-soft)}
.items{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(18,32,59,.07)}
.item{
  display:flex;align-items:center;gap:10px;padding:11px 12px;
  border-bottom:1px solid var(--line);min-height:56px;
}
.item:last-child{border-bottom:0}
.tick{
  width:30px;height:30px;border-radius:50%;border:2.5px solid #C0CEDF;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:900;
}
.item.done .tick{background:var(--green);border-color:var(--green)}
.emo{font-size:24px;width:30px;text-align:center;flex-shrink:0}
.meta{flex:1;min-width:0;padding:2px 0}
.iname{font-size:17.5px;font-weight:700;word-break:break-word}
.qbadge{display:inline-block;font-size:12px;font-weight:900;color:var(--navy);background:#EAF1FB;border-radius:6px;padding:1px 7px;margin-left:6px;vertical-align:1px;font-variant-numeric:tabular-nums}
.item.done .iname{text-decoration:line-through;color:var(--ink-soft);font-weight:600}
.tagsrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px}
.mealtag{font-size:11.5px;font-weight:800;color:var(--navy);background:#E3F4FD;border-radius:6px;padding:2px 7px}
.flag{font-size:11px;font-weight:900;border-radius:6px;padding:2px 7px;letter-spacing:.3px}
.flag.new{background:#E4F7EC;color:#0E6A33}
.flag.late{background:#FDE7EC;color:#9B0020}
.flag.recent{background:#FFF3D6;color:#7A5A00}
.flag.skip{background:#EDF1F7;color:#5A6A85}
.flag.home{background:#EAF6FD;color:#0A6C93}
.notepeek{font-size:12.5px;color:var(--ink-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.price{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--ink)}
.price small{display:block;font-size:10px;font-weight:700;color:var(--ink-soft);text-align:right}
.item.done .price{color:var(--ink-soft)}
.empty{margin:40px 20px;text-align:center;color:var(--ink-soft);font-size:15.5px;line-height:1.5}
.empty b{color:var(--navy)}

/* ---------- Bottom bar: store tabs + totals ---------- */
.bottom{
  position:fixed;left:0;right:0;bottom:0;z-index:35;
  background:var(--navy);color:#fff;
  padding:0 0 calc(10px + env(safe-area-inset-bottom));
}
.storetabs{display:flex;background:var(--navy-deep)}
.storetabs button{
  flex:1;padding:11px 0 9px;font-weight:900;font-size:14px;letter-spacing:.4px;
  color:#8FA5CE;border-top:3px solid transparent;position:relative;
}
.storetabs button .n{
  font-size:11px;font-weight:800;border-radius:999px;padding:1px 7px;margin-left:5px;
  background:rgba(255,255,255,.14);color:#fff;
}
.storetabs button.on{color:#fff}
.storetabs button.on.tA{border-top-color:var(--cyan)}
.storetabs button.on.tW{border-top-color:var(--wool)}
.storetabs button.on.tC{border-top-color:var(--coles)}
.storetabs button.on.tA .n{background:var(--cyan)}
.storetabs button.on.tW .n{background:var(--wool)}
.storetabs button.on.tC .n{background:var(--coles);color:#fff}
.totrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 16px 0}
.totcell{font-size:11px;font-weight:700;color:#9FB4DC;text-transform:uppercase;letter-spacing:.6px}
.totcell b{display:block;font-size:18px;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:0;text-transform:none}
.totcell.trolley b{color:var(--yellow)}
.shopbtn{
  background:var(--orange);border-radius:12px;padding:11px 16px;
  font-size:15px;font-weight:900;color:#fff;flex-shrink:0;
}
.shopbtn.subtle{background:rgba(255,255,255,.14);font-size:13px;padding:9px 13px}

/* ---------- Sheets ---------- */
.scrim{position:fixed;inset:0;background:rgba(0,19,60,.45);z-index:50;display:none}
.scrim.show{display:block}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:51;background:#fff;
  border-radius:22px 22px 0 0;padding:10px 18px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(105%);transition:transform .22s ease;max-height:88vh;overflow-y:auto;
}
.sheet.show{transform:translateY(0)}
@media (prefers-reduced-motion:reduce){.sheet{transition:none}}
.grab{width:42px;height:5px;border-radius:3px;background:#D6DFEC;margin:4px auto 12px}
.sheethead{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sheethead .emo{font-size:32px;width:auto}
.sheethead h3{font-size:21px;font-weight:900;flex:1;word-break:break-word}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-soft);margin-bottom:7px}
.field textarea{width:100%;border:2px solid var(--line);border-radius:12px;padding:11px;font-size:16px;min-height:68px;resize:vertical;outline:none}
.field textarea:focus{border-color:var(--cyan)}
.field input[type=text],.field input[type=number],.field select{
  width:100%;border:2px solid var(--line);border-radius:12px;padding:11px;font-size:16px;outline:none;background:#fff;
}
.field input:focus,.field select:focus{border-color:var(--cyan)}
.hint{font-size:12.5px;color:var(--ink-soft);margin-top:6px;line-height:1.4}
.storepick,.segpick{display:flex;gap:8px}
.storepick button,.segpick button{
  flex:1;border:2px solid var(--line);border-radius:12px;padding:11px 4px;
  font-weight:900;font-size:14px;color:var(--ink-soft);
}
.storepick button.on.sA{background:var(--cyan);border-color:var(--cyan);color:#fff}
.storepick button.on.sW{background:var(--wool);border-color:var(--wool);color:#fff}
.storepick button.on.sC{background:var(--coles);border-color:var(--coles);color:#fff}
.segpick button.on{background:var(--navy);border-color:var(--navy);color:#fff}
.pricerow{display:flex;align-items:center;gap:8px}
.pricerow span{font-size:20px;font-weight:900}
.pricerow input{width:110px;border:2px solid var(--line);border-radius:12px;padding:10px 12px;font-size:17px;outline:none;font-variant-numeric:tabular-nums}
.pricerow input:focus{border-color:var(--cyan)}
.pricerow .src{font-size:12px;color:var(--ink-soft);flex:1;line-height:1.35}
.qtyrow{display:flex;gap:8px;align-items:center}
.qtyrow input{flex:1;border:2px solid var(--line);border-radius:12px;padding:11px;font-size:16px;outline:none}
.qtyrow input:focus{border-color:var(--cyan)}
.qstep{display:flex;gap:6px;flex-shrink:0}
.qstep button{width:44px;border:2px solid var(--line);border-radius:12px;font-size:20px;font-weight:900;color:var(--navy)}
.qchips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.qchips button{border:1.5px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13.5px;font-weight:800;color:var(--ink-soft)}
.sheetacts{display:flex;gap:10px;margin-top:6px}
.sheetacts .del{flex:1;background:#FBE9ED;color:var(--red);font-weight:900;border-radius:12px;padding:14px 0;font-size:16px}
.sheetacts .ok{flex:2;background:var(--navy);color:#fff;font-weight:900;border-radius:12px;padding:14px 0;font-size:16px}
.rowbtns{display:flex;flex-direction:column;gap:9px}
.rowbtns button{
  border:2px solid var(--line);border-radius:12px;padding:13px;font-weight:800;font-size:15.5px;text-align:left;background:#fff;
  display:flex;align-items:center;gap:10px;
}
.rowbtns button b{margin-left:auto;color:var(--ink-soft);font-size:13px;font-weight:800}

/* ---------- Meals ---------- */
.mealswrap{padding:6px 14px}
.mealcard{background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(18,32,59,.07);padding:14px;margin-bottom:14px}
.mealtop{display:flex;align-items:center;gap:8px}
.mealtop h3{font-size:18.5px;font-weight:900;flex:1;word-break:break-word}
.mealtop .x{color:var(--ink-soft);font-size:14px;font-weight:800;padding:6px}
.ingrows{margin:10px 0 4px}
.ingrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:16px}
.ingrow:last-child{border-bottom:0}
.ingrow .emo{font-size:19px;width:24px}
.ingrow .nm{flex:1;font-weight:600}
.ingrow .rm{color:var(--ink-soft);font-weight:800;padding:2px 8px;font-size:15px}
.ingadd{display:flex;gap:8px;margin-top:8px}
.ingadd input{flex:1;border:2px solid var(--line);border-radius:11px;padding:10px 12px;font-size:16px;outline:none;min-width:0}
.ingadd input:focus{border-color:var(--cyan)}
.ingadd button{background:var(--navy);color:#fff;font-weight:900;border-radius:11px;padding:0 16px}
.pushbtn{width:100%;margin-top:12px;background:var(--orange);color:#fff;font-weight:900;border-radius:12px;padding:13px 0;font-size:16px}
.pushbtn:disabled{opacity:.45}
.pushbtn.donepush{background:var(--green)}
.newmeal{display:flex;gap:8px;margin-bottom:16px}
.newmeal input{flex:1;border:2px solid var(--line);border-radius:14px;padding:13px 14px;font-size:17px;background:#fff;outline:none;min-width:0}
.newmeal input:focus{border-color:var(--cyan)}
.newmeal button{background:var(--navy);color:#fff;font-weight:900;border-radius:14px;padding:0 18px;font-size:16px}

/* ---------- Specials ---------- */
.specwrap{padding:12px 14px}
.speccard{background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(18,32,59,.07);padding:15px;margin-bottom:13px}
.specthumb{width:100%;height:120px;border-radius:12px;margin-bottom:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--navy) 0%,#0A3A8A 100%)}
.specthumb .stripe{position:absolute;top:0;left:0;right:0;height:6px;display:flex}
.specthumb .stripe i{flex:1}
.specthumb .stripe i:nth-child(1){background:var(--cyan)}.specthumb .stripe i:nth-child(2){background:var(--orange)}
.specthumb .stripe i:nth-child(3){background:var(--red)}.specthumb .stripe i:nth-child(4){background:var(--yellow)}
.specthumb .bag{font-size:38px;line-height:1}
.specthumb .lbl{font-weight:900;font-size:14px;letter-spacing:.5px;margin-top:6px;text-transform:uppercase}
.specthumb .sub{font-size:11.5px;color:#BFD3F5;font-weight:700;margin-top:2px}
.specthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.specthumb .setpic{position:absolute;bottom:7px;right:8px;background:rgba(0,0,0,.42);color:#fff;font-size:11px;font-weight:800;border-radius:8px;padding:4px 9px}
/* secondary-store section headers in the main list */
.storehdr{display:flex;align-items:center;gap:9px;margin:20px 0 8px;padding:0 2px}
.storehdr .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.storehdr.W .dot{background:var(--wool)}.storehdr.C .dot{background:var(--coles)}
.storehdr h2{font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.8px}
.storehdr.W h2{color:var(--wool)}.storehdr.C h2{color:var(--coles)}
.storehdr .sub{font-size:12px;font-weight:700;color:var(--ink-soft);margin-left:auto}
.storehdr .rule{display:none}
.secstore{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(18,32,59,.07);margin:0 2px}
.spectop{display:flex;align-items:center;gap:10px}
.specdate{
  background:var(--yellow);color:var(--navy);border-radius:10px;padding:7px 10px;text-align:center;flex-shrink:0;
  font-weight:900;line-height:1.05;
}
.specdate .d{font-size:19px}.specdate .m{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px}
.spectop h3{font-size:17px;font-weight:900;flex:1}
.spectop .when{font-size:12px;font-weight:800;color:var(--ink-soft)}
.spechl{margin:10px 0 2px;font-size:14.5px;color:var(--ink);line-height:1.45}
.spechl li{margin:3px 0 3px 18px}
.speclink{
  display:block;margin-top:11px;background:var(--navy);color:#fff;text-align:center;text-decoration:none;
  border-radius:11px;padding:12px 0;font-weight:900;font-size:15px;
}
.specrefresh{width:100%;background:var(--cyan);color:#fff;font-weight:900;border-radius:12px;padding:13px 0;font-size:15px;margin-bottom:13px}
.specrefresh:disabled{opacity:.5}
.specnote{font-size:12.5px;color:var(--ink-soft);text-align:center;padding:4px 10px 14px;line-height:1.45}

/* ---------- Shop mode ---------- */
#shop{position:fixed;inset:0;z-index:70;background:var(--paper);display:none;flex-direction:column}
#shop.show{display:flex}
.shophead{background:var(--navy);color:#fff;padding:calc(10px + env(safe-area-inset-top)) 14px 12px;flex-shrink:0}
.shoprow1{display:flex;align-items:center;gap:10px}
.shoprow1 .exit{font-size:14px;font-weight:800;color:#BFD3F5;padding:6px 4px}
.shoprow1 h2{font-size:18px;font-weight:900;flex:1;text-align:center}
.shoprow1 .fin{background:var(--orange);color:#fff;font-weight:900;font-size:14px;border-radius:10px;padding:8px 13px}
.progressbar{height:7px;border-radius:5px;background:rgba(255,255,255,.18);margin-top:11px;overflow:hidden}
.progressbar i{display:block;height:100%;background:var(--yellow);border-radius:5px;transition:width .25s}
.shopstats{display:flex;justify-content:space-between;margin-top:8px;font-size:11.5px;font-weight:700;color:#9FB4DC;text-transform:uppercase;letter-spacing:.5px}
.shopstats b{color:#fff;font-size:14.5px;display:block;text-transform:none;font-variant-numeric:tabular-nums}
.shopbody{flex:1;overflow-y:auto;padding:10px 12px calc(30px + env(safe-area-inset-bottom))}
.shopsec{margin-bottom:12px;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 1px 3px rgba(18,32,59,.07)}
.shopsec.current{box-shadow:0 0 0 3px var(--cyan),0 2px 8px rgba(18,32,59,.13)}
.shopsec.donesec{opacity:.62}
.shopsechead{display:flex;align-items:center;gap:9px;padding:13px 14px;background:#fff;width:100%;text-align:left}
.shopsec.current .shopsechead{background:var(--navy);color:#fff}
.shopsechead .no{
  width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;font-size:12.5px;font-weight:900;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.shopsec.current .shopsechead .no{background:var(--cyan)}
.shopsec.donesec .shopsechead .no{background:var(--green)}
.shopsechead h3{font-size:15px;font-weight:900;flex:1}
.shopsechead .cnt{font-size:12px;font-weight:800;color:var(--ink-soft)}
.shopsec.current .shopsechead .cnt{color:#BFD3F5}
.shopsechead .here{font-size:11.5px;font-weight:900;color:var(--cyan);border:1.5px solid var(--cyan);border-radius:8px;padding:4px 8px}
.shopitem{display:flex;align-items:center;gap:11px;padding:13px 14px;border-top:1px solid var(--line)}
.shopitem .bigtick{
  width:42px;height:42px;border-radius:50%;border:3px solid #C0CEDF;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:21px;color:#fff;font-weight:900;
}
.shopitem.done .bigtick{background:var(--green);border-color:var(--green)}
.shopitem .meta{padding:0}
.shopitem .iname{font-size:18px}
.shopitem.done .iname{text-decoration:line-through;color:var(--ink-soft)}
.shopitem .skipb{font-size:12px;font-weight:900;color:var(--ink-soft);border:1.5px solid var(--line);border-radius:9px;padding:6px 10px;flex-shrink:0}
.shopitem.skipped{background:#F6F8FC}
.shopitem.skipped .iname{color:var(--ink-soft)}
.snack{
  position:fixed;left:12px;right:12px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:80;
  background:var(--ink);color:#fff;border-radius:14px;padding:13px 16px;font-size:15px;font-weight:700;
  display:none;align-items:center;gap:10px;box-shadow:0 6px 20px rgba(0,0,0,.25);
}
.snack.show{display:flex}
.snack .u{margin-left:auto;color:var(--yellow);font-weight:900;padding:4px 8px;flex-shrink:0}

/* ---------- Layout editor ---------- */
.laylist{margin-bottom:10px}
.layrow{
  display:flex;align-items:center;gap:9px;background:#fff;border:2px solid var(--line);
  border-radius:12px;padding:11px 12px;margin-bottom:8px;font-weight:700;font-size:15.5px;
}
.layrow.dragging{opacity:.4}
.layrow .handle{font-size:17px;color:#B7C4D8;cursor:grab;touch-action:none;padding:4px 6px 4px 0}
.layrow .nm{flex:1;min-width:0}
.layrow .mv{color:var(--ink-soft);font-weight:900;font-size:16px;padding:4px 8px}
.layrow .locnote{font-size:11.5px;color:var(--ink-soft);font-weight:600;display:block}

/* ---------- Review / receipt ---------- */
.rcthumbs{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px}
.rcthumbs .th{position:relative;flex-shrink:0}
.rcthumbs img{height:86px;border-radius:10px;border:2px solid var(--line)}
.rcthumbs .rx{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;width:22px;height:22px;border-radius:50%;font-size:12px;font-weight:900}
.ocrbox{width:100%;border:2px solid var(--line);border-radius:12px;padding:10px;font-size:13px;font-family:ui-monospace,monospace;min-height:80px;resize:vertical}
.revline input.p{width:74px;border:2px solid var(--line);border-radius:9px;padding:7px;font-size:14px;text-align:right}
.revline .conf{font-size:10.5px;font-weight:900;border-radius:6px;padding:2px 6px}
.conf.hi{background:#E4F7EC;color:#0E6A33}.conf.md{background:#FFF3D6;color:#7A5A00}.conf.lo{background:#FDE7EC;color:#9B0020}
.progressnote{text-align:center;font-size:13.5px;color:var(--ink-soft);padding:10px 0}
.revline{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid var(--line);font-size:15px}
.revline:last-child{border-bottom:0}
.revline .raw{flex:1;min-width:0}
.revline .raw small{display:block;color:var(--ink-soft);font-size:12px}
.revline select{max-width:46%;border:2px solid var(--line);border-radius:9px;padding:7px;font-size:13.5px;background:#fff}
.bigact{width:100%;background:var(--navy);color:#fff;font-weight:900;border-radius:12px;padding:14px 0;font-size:16px;margin-top:12px}
.bigact.orange{background:var(--orange)}
.bigact:disabled{opacity:.5}
.ghostact{width:100%;background:#fff;border:2px solid var(--line);color:var(--ink);font-weight:800;border-radius:12px;padding:13px 0;font-size:15px;margin-top:9px}

.toast{
  position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(140px + env(safe-area-inset-bottom));
  background:var(--ink);color:#fff;font-size:14px;font-weight:700;border-radius:999px;
  padding:10px 18px;opacity:0;transition:all .25s;z-index:85;pointer-events:none;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spin{display:inline-block;width:15px;height:15px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp 1s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>

/* =========================================================
   Matching
========================================================= */
function norm(s){return s.toLowerCase().trim().replace(/\s+/g," ");}
const ENTRIES = DICT.map(d=>({name:d[0],aliases:d[1]?d[1].split("|"):[],emoji:d[2],cat:d[3],price:d[4],store:d[5]}));
function findMatch(q){
  q = norm(q); if(!q) return null;
  let exact = ENTRIES.find(e=>norm(e.name)===q || e.aliases.some(a=>norm(a)===q));
  if(exact) return exact;
  let starts = ENTRIES.find(e=>norm(e.name).startsWith(q) || e.aliases.some(a=>norm(a).startsWith(q)));
  if(starts) return starts;
  // word-level: "turkish bread" matches an alias word-set even mid-string
  let contains = ENTRIES.find(e=>norm(e.name).includes(q) || e.aliases.some(a=>norm(a).includes(q)));
  if(contains) return contains;
  // reverse containment: query contains a known name/alias ("big turkish bread loaf")
  let rev=null, revLen=0;
  for(const e of ENTRIES){
    for(const cand of [e.name,...e.aliases]){
      const c = norm(cand);
      if(c.length>=4 && q.includes(c) && c.length>revLen){ rev=e; revLen=c.length; }
    }
  }
  return rev;
}
function suggestions(q){
  q = norm(q); if(q.length<2) return [];
  const scored=[];
  for(const e of ENTRIES){
    const n = norm(e.name);
    let score = -1;
    if(n.startsWith(q)) score=3;
    else if(e.aliases.some(a=>norm(a).startsWith(q))) score=2;
    else if(n.includes(q)||e.aliases.some(a=>norm(a).includes(q))) score=1;
    if(score>0) scored.push([score,e]);
  }
  scored.sort((a,b)=>b[0]-a[0]);
  return scored.slice(0,5).map(x=>x[1]);
}

function setSync(s){
  syncStatus=s;
  const el=$("#syncPill"); if(!el) return;
  const map={saved:["Saved","#178841"],sync:["Syncing\u2026","#1CBBEE"],off:["Offline","#FF7800"],err:["Sync error","#D50029"],local:["Not signed in","#8FA5CE"],localonly:["Local only","#8FA5CE"]};
  const m=map[s]||map.local;
  el.textContent=m[0]; el.style.background=m[1];

function migrate(st){
  st = st || {};
  st.items = (st.items||[]).map(i=>Object.assign({
    id:uid(), name:"", emoji:"\u{1F6D2}", cat:"other", price:0, store:"A",
    note:"", meal:"", qty:"", checked:false, updatedAt:0, addedAt:0, addedBy:"", addedByUid:"",
    skipped:false, checkHome:false, priceSrc:"", deleted:false,
  }, i));
  st.meals = (st.meals||[]).map(m=>Object.assign({id:uid(), name:"", ings:[], updatedAt:0, deleted:false}, m));
  if(!st.layouts || !st.layouts.filter(l=>!l.deleted).length){
    st.layouts = (st.layouts||[]).concat([{id:"default", name:"My ALDI (default)", order:DEFAULT_ORDER.slice(), notes:{}, updatedAt:0, deleted:false}]);
  }
  st.layouts = st.layouts.map(l=>Object.assign({id:uid(),name:"Store",order:DEFAULT_ORDER.slice(),notes:{},updatedAt:0,deleted:false},l));
  if(!st.activeLayout || !st.layouts.find(l=>l.id===st.activeLayout && !l.deleted)) st.activeLayout = st.layouts.find(l=>!l.deleted).id;
  st.session = st.session||null;
  st.rev = st.rev||0;
  return st;
}
function liveItems(){ return state.items.filter(i=>!i.deleted); }
function activeLayout(){ return state.layouts.find(l=>l.id===state.activeLayout && !l.deleted) || state.layouts.find(l=>!l.deleted); }
function orderedCats(){
  const ord = activeLayout().order.filter(id=>CAT_BY_ID[id]);
  for(const c of CATS) if(!ord.includes(c.id)) ord.push(c.id);
  return ord;
}
function tombstone(id){ /* soft delete now lives on the record itself */ }
function removeRecord(list, id){
  const r = list.find(x=>x.id===id);
  if(r){ r.deleted=true; r.updatedAt=now(); }
}

function cacheLocal(){
  try{ localStorage.setItem(LKEY, JSON.stringify({state, know})); }catch(e){}

    const raw = localStorage.getItem(LKEY);
    if(raw){ const p=JSON.parse(raw); state=migrate(p.state); know=p.know||know; }
    else {

      const old = localStorage.getItem(LEGACY);
      if(old){ state = migrate(JSON.parse(old)); }
      else state = migrate(state);
    }
  }catch(e){ state=migrate(state); }
  know.mem=know.mem||{}; know.aliases=know.aliases||{};
  try{ const p=localStorage.getItem(PKEY); if(p) prefs=Object.assign(prefs,JSON.parse(p)); }catch(e){}
}

/* ---------- Firebase ---------- */
function hh(path){ return "households/"+HOUSEHOLD+"/"+path; }
function initFirebase(){
  if(!FB_READY){ setSync("localonly"); return; }
  fbApp  = firebase.initializeApp(FIREBASE_CONFIG);
  fbAuth = firebase.auth();
  fbDB   = firebase.database();
  fbDB.ref(".info/connected").on("value", s=>{
    fbConnected = !!s.val();
    if(fbConnected){ setSync(fbUser?"saved":"local"); flushQueue(); }
    else setSync(fbUser?"off":"local");
  });
  fbAuth.onAuthStateChanged(u=>{

    if(u){
      prefs.uid = u.uid;
      if(!prefs.name) prefs.name = (u.uid===JAY_UID)?"Jay":(u.uid===MONIKA_UID)?"Monika":(u.email||"").split("@")[0];

    } else {

      openSignIn();
    }

/* record-level write with offline queue */
function fbWrite(path, value){
  if(!FB_READY || !fbUser){ return; }
  const doSet = ()=> fbDB.ref(hh(path)).set(value).then(()=>setSync("saved")).catch(()=>{ queueOp(path,value); setSync("err"); });
  if(!fbConnected){ queueOp(path,value); setSync("off"); }
  else { setSync("sync"); doSet(); }
}
function queueOp(path,value){
  try{
    const q = JSON.parse(localStorage.getItem(QKEY)||"[]");
    q.push({path,value,at:now()});
    localStorage.setItem(QKEY, JSON.stringify(q.slice(-400)));
  }catch(e){}
}
function flushQueue(){
  if(!FB_READY||!fbUser||!fbConnected) return;
  let q=[]; try{ q=JSON.parse(localStorage.getItem(QKEY)||"[]"); }catch(e){}
  if(!q.length) return;
  localStorage.setItem(QKEY,"[]");
  // guard: only apply if not older than what's now on the server
  q.forEach(op=>{
    const ref = fbDB.ref(hh(op.path));
    ref.once("value").then(s=>{
      const cur = s.val();
      if(cur && op.value && (cur.updatedAt||0) > (op.value.updatedAt||0)) return; // remote is newer
      ref.set(op.value).catch(()=>queueOp(op.path,op.value));
    });
  });
}

/* diff-based save: writes only records that changed, never one giant blob */
let lastSnap = {items:{}, meals:{}, layouts:{}, mem:{}, aliases:{}, session:"", meta:"", catalog:""};
function snapKey(r){ return JSON.stringify(r); }
function saveState(){
  state.rev=(state.rev||0)+1;
  lastEditAt = now();
  clearTimeout(dirtyTimer);
  dirtyTimer = setTimeout(flushDiff, 450);
}
function saveKnow(){ saveState(); }
function flushDiff(){
  cacheLocal();
  if(!FB_READY || !fbUser) return;
  const collections = [["items",state.items],["meals",state.meals],["layouts",state.layouts]];
  collections.forEach(([name,list])=>{
    list.forEach(r=>{
      const k = snapKey(r);
      if(lastSnap[name][r.id]!==k){ lastSnap[name][r.id]=k; fbWrite(name+"/"+r.id, r); }
    });
  });
  Object.entries(know.mem).forEach(([k,v])=>{
    const s=snapKey(v); const kk=k.replace(/[.#$/\[\]]/g,"_");
    if(lastSnap.mem[kk]!==s){ lastSnap.mem[kk]=s; fbWrite("itemMemory/"+kk, Object.assign({key:k},v)); }
  });
  Object.entries(know.aliases).forEach(([k,v])=>{
    const s=snapKey(v); const kk=k.replace(/[.#$/\[\]]/g,"_");
    if(lastSnap.aliases[kk]!==s){ lastSnap.aliases[kk]=s; fbWrite("receiptAliases/"+kk, Object.assign({key:k},v)); }
  });
  const cs = snapKey(know.catalog);
  if(know.catalog && lastSnap.catalog!==cs){ lastSnap.catalog=cs; fbWrite("catalog", know.catalog); }
  const ss = snapKey(state.session);
  if(lastSnap.session!==ss){ lastSnap.session=ss; fbWrite("activeSession", state.session||null); }
  const meta = snapKey({activeLayout:state.activeLayout});
  if(lastSnap.meta!==meta){ lastSnap.meta=meta; fbWrite("meta", {activeLayout:state.activeLayout, updatedAt:now()}); }
}

/* live listeners: reconcile newest-wins per record */
function reconcileList(list, incoming){
  let fresh=[];
  Object.values(incoming||{}).forEach(r=>{
    if(!r||!r.id) return;
    const i = list.findIndex(x=>x.id===r.id);
    if(i<0){ list.push(r); if(!r.deleted) fresh.push(r); }
    else if((r.updatedAt||0) > (list[i].updatedAt||0)) list[i]=r;
  });
  return fresh;
}
function attachListeners(){
  if(listenersOn || !fbDB) return;
  listenersOn = true;
  fbDB.ref(hh("items")).on("value", s=>{
    const fresh = reconcileList(state.items, s.val())
      .filter(r=>r.addedByUid && r.addedByUid!==prefs.uid && (now()-(r.addedAt||0))<600000);
    state.items = state.items; // in-place
    Object.values(s.val()||{}).forEach(r=>{ lastSnap.items[r.id]=snapKey(state.items.find(x=>x.id===r.id)||r); });
    state = migrate(state);
    if(fresh.length) onRemoteAdditions(fresh);
    cacheLocal(); renderAll();
  });
  fbDB.ref(hh("meals")).on("value", s=>{
    reconcileList(state.meals, s.val());
    Object.values(s.val()||{}).forEach(r=>{ lastSnap.meals[r.id]=snapKey(state.meals.find(x=>x.id===r.id)||r); });
    state = migrate(state); cacheLocal(); renderAll();
  });
  fbDB.ref(hh("layouts")).on("value", s=>{
    reconcileList(state.layouts, s.val());
    Object.values(s.val()||{}).forEach(r=>{ lastSnap.layouts[r.id]=snapKey(state.layouts.find(x=>x.id===r.id)||r); });
    state = migrate(state); cacheLocal(); renderAll();
  });
  fbDB.ref(hh("activeSession")).on("value", s=>{
    const r = s.val();
    if(r===null && state.session && lastSnap.session!==snapKey(null)) { /* other device cleared */ }
    if(r && (!state.session || (r.updatedAt||0)>(state.session.updatedAt||0))){ state.session=r; }
    else if(r===null && state.session && state.session.finishedAt){ state.session=null; }
    lastSnap.session = snapKey(state.session);
    cacheLocal(); renderAll();
  });
  fbDB.ref(hh("itemMemory")).on("value", s=>{
    Object.values(s.val()||{}).forEach(r=>{
      if(!r||!r.key) return;
      const cur = know.mem[r.key];
      if(!cur || (r.updatedAt||0)>(cur.updatedAt||0)){ const c=Object.assign({},r); delete c.key; know.mem[r.key]=c; }
      lastSnap.mem[r.key.replace(/[.#$/\[\]]/g,"_")] = snapKey(know.mem[r.key]);
    });
    cacheLocal();
  });
  fbDB.ref(hh("receiptAliases")).on("value", s=>{
    Object.values(s.val()||{}).forEach(r=>{
      if(!r||!r.key) return;
      const cur = know.aliases[r.key];
      if(!cur || (r.updatedAt||0)>(cur.updatedAt||0)){ const c=Object.assign({},r); delete c.key; know.aliases[r.key]=c; }
      lastSnap.aliases[r.key.replace(/[.#$/\[\]]/g,"_")] = snapKey(know.aliases[r.key]);
    });
    cacheLocal();
  });
  fbDB.ref(hh("catalog")).on("value", s=>{
    const c=s.val();
    if(c && (!know.catalog || (c.updatedAt||0)>(know.catalog.updatedAt||0))){ know.catalog=c; lastSnap.catalog=snapKey(c); cacheLocal(); if($("#pageSpec").style.display!=="none") renderSpecials(); }
  });
  fbDB.ref(hh("meta")).on("value", s=>{
    const m=s.val();
    if(m && m.activeLayout && state.layouts.find(l=>l.id===m.activeLayout)) { state.activeLayout=m.activeLayout; renderAll(); }
  });
}

function importJSONText(txt){
  try{
    const p = JSON.parse(txt);
    if(p.state){ // full backup
      const inc = migrate(p.state);
      inc.items.forEach(r=>{ if(!state.items.find(x=>x.id===r.id)) state.items.push(r); });
      inc.meals.forEach(r=>{ if(!state.meals.find(x=>x.id===r.id)) state.meals.push(r); });
      inc.layouts.forEach(r=>{ if(!state.layouts.find(x=>x.id===r.id)) state.layouts.push(r); });
      Object.assign(know.mem, (p.know&&p.know.mem)||{});
      Object.assign(know.aliases, (p.know&&p.know.aliases)||{});

    }
    if(p.items || p.meals){ return importPlatedPayload(p); } // Plated-style payload

/* =========================================================
   Item memory (learned prefs + shelf life + price history)
========================================================= */
function memKey(name){ return norm(name); }
function getMem(name){ return know.mem[memKey(name)] || null; }
function touchMem(name, patch){
  const k = memKey(name);
  const m = know.mem[k] || {};
  Object.assign(m, patch, {updatedAt:now()});
  know.mem[k]=m; saveKnow();
  return m;
}
function shelfFor(item){
  const m = getMem(item.name);
  if(m && m.cls) return {cls:m.cls, days:m.days || (SHELF_DEFAULT[item.cat]&&SHELF_DEFAULT[item.cat].days) || 30};
  const ov = SHELF_OVERRIDES[memKey(item.name)];
  if(ov) return {cls:"t", days:ov};
  const d = SHELF_DEFAULT[item.cat] || {cls:"s"};
  return {cls:d.cls, days:d.days||30};
}
function bestPrice(name, fallback){
  const m = getMem(name);
  if(m && m.hist && m.hist.length){
    const recent = m.hist.slice(-3);
    const avg = recent.reduce((s,h)=>s+(+h.p||0),0)/recent.length;
    const last = m.hist[m.hist.length-1];
    const age = daysAgo(last.d);
    if(age<=45) return {price:last.p, src:"paid "+(age===0?"today":age+"d ago")};
    return {price:Math.round(avg*20)/20, src:"based on "+recent.length+" older purchase"+(recent.length===1?"":"s")};
  }
  return {price:fallback||0, src: fallback?"rough guess":""};
}

   List actions
========================================================= */
const NEW_ITEM_STORE = "A"; // ALDI is the default home store for new items

/* pull a quantity off free text: "2 milk", "milk x3", "500g mince", "2 L milk" */
var QTY_UNIT = "(?:kgs?|kg|grams?|g|litres?|liters?|ltr|l|mls?|ml|packs?|pks?|pk|dozen|doz|bunch|tins?|cans?|jars?|bottles?)";
function tidyUnit(n, u){
  u = u.toLowerCase().replace(/s$/,"");
  var map = {kg:"kg", gram:"g", g:"g", litre:"L", liter:"L", ltr:"L", l:"L", ml:"ml",
             pk:"pk", pack:"pk", doz:"dozen", dozen:"dozen", bunch:"bunch",
             tin:"tin", can:"can", jar:"jar", bottle:"bottle"};
  u = map[u] || u;
  if(u==="dozen"||u==="bunch"||u==="tin"||u==="can"||u==="jar"||u==="bottle"||u==="pk"){
    return n + " " + u + ((+n>1 && u!=="dozen" && u!=="pk") ? "s" : "");
  }
  return n + u;
}
function splitQty(raw){
  var t = String(raw||"").trim(), m;
  // leading measure: "500g mince", "1.5kg chicken", "2 L milk", "2 packs bacon"
  m = t.match(new RegExp("^(\\d+(?:\\.\\d+)?)\\s*(" + QTY_UNIT + ")\\s+(.+)$", "i"));
  if(m && m[3].trim().length > 1) return {qty: tidyUnit(m[1], m[2]), rest: m[3].trim()};
  // trailing measure: "mince 500g", "milk 2 L"
  m = t.match(new RegExp("^(.+?)\\s+(\\d+(?:\\.\\d+)?)\\s*(" + QTY_UNIT + ")$", "i"));
  if(m && m[1].trim().length > 1) return {qty: tidyUnit(m[2], m[3]), rest: m[1].trim()};
  // bare dozen: "dozen eggs" / "eggs dozen"
  m = t.match(/^dozen\s+(.+)$/i);
  if(m) return {qty:"dozen", rest:m[1].trim()};
  m = t.match(/^(.+?)\s+dozen$/i);
  if(m && m[1].trim().length > 1) return {qty:"dozen", rest:m[1].trim()};
  // leading count: "2 milk", "2x bread", "3 bananas"
  m = t.match(/^(\d+)\s*x?\s+(.+)$/i);
  if(m && m[2].trim().length > 1) return {qty: m[1] + "\u00D7", rest: m[2].trim()};
  // trailing count: "milk x3"
  m = t.match(/^(.+?)\s*x\s*(\d+)$/i);
  if(m && m[1].trim().length > 1) return {qty: m[2] + "\u00D7", rest: m[1].trim()};
  return {qty:"", rest:t};
}
function addItem(raw, mealName, opts){
  opts = opts||{};
  const parsed = splitQty(raw);
  const text = parsed.rest.trim(); if(!text) return null;
  const m = findMatch(text);
  const name = m ? m.name : (text.charAt(0).toUpperCase()+text.slice(1));
  const qty = opts.qty || parsed.qty || "";
  const mem = getMem(name);
  const pr = bestPrice(name, m?m.price:0);
  const item = {
    id: uid(),
    name,
    emoji: m ? m.emoji : "\u{1F6D2}",
    cat: (mem&&mem.cat) ? mem.cat : (m ? m.cat : "other"),
    price: pr.price, priceSrc: pr.src,
    store: (mem&&mem.store) ? mem.store : (m ? m.store : NEW_ITEM_STORE),
    note:"", meal: mealName||"", qty, checked:false, skipped:false, checkHome:!!opts.checkHome,
    addedAt: now(), updatedAt: now(), addedBy: prefs.name||"", addedByUid: prefs.uid||"", deleted:false,
  };
  const dup = liveItems().find(i=>norm(i.name)===norm(item.name) && !i.checked);
  if(dup){
    if(mealName && !dup.meal.split(", ").includes(mealName)){
      dup.meal = dup.meal ? dup.meal+", "+mealName : mealName;
      dup.updatedAt = now();
    }
    if(qty && !dup.qty){ dup.qty = qty; dup.updatedAt = now(); }
    return dup;
  }
  state.items.push(item);
  return item;
}
function removeItem(id){
  removeRecord(state.items, id);
}

/* recent-purchase check before adding a staple */
function maybeWarnThenAdd(text, mealName){
  const m = findMatch(text);
  const name = m ? m.name : (text.trim().charAt(0).toUpperCase()+text.trim().slice(1));
  const mem = getMem(name);
  const probe = {name, cat:(mem&&mem.cat)||(m?m.cat:"other")};
  const shelf = shelfFor(probe);
  const isStaple = shelf.cls==="t";
  const warnable = mem && mem.last && !mem.warnOff && (isStaple || prefs.warnShort);
  if(warnable && daysAgo(mem.last) <= shelf.days){
    openRecentSheet(name, mem, text, mealName);
    return;
  }
  finishAdd(text, mealName, {});
}
function finishAdd(text, mealName, opts){
  const it = addItem(text, mealName, opts);
  saveState(); renderAll();
  $("#addInput").value=""; $("#suggRow").innerHTML="";
  if(!it) return;
  if(it.store!=="A"){

/* =========================================================
   In-app alerts (batched; NOT push — see settings note)
========================================================= */
let bannerQueue = [];
function onRemoteAdditions(fresh){
  if(!prefs.notif) return;
  const sess = state.session;
  const iAmShopping = sess && !sess.finishedAt && sess.startedBy===prefs.name;
  if(iAmShopping){
    const layout = state.layouts.find(l=>l.id===sess.layoutId) || activeLayout();
    const order = layout.order;
    const curIdx = order.indexOf(sess.currentCat||order[0]);
    fresh.forEach(f=>{
      if(f.store!==sess.store) return;
      const idx = order.indexOf(f.cat);
      if(f.cat==="other"){ f.lateFlag="unknown"; }
      else if(idx<0){ f.lateFlag="new"; }
      else if(idx<curIdx){ f.lateFlag="late"; }
      else if(idx===curIdx){ f.lateFlag="just"; }
      else { f.lateFlag="new"; }
      f.updatedAt = now();
    });
    const lates = fresh.filter(f=>f.lateFlag==="late");
    if(lates.length && prefs.lateBypass){
      buzz([60,80,60]);
      showBanner("late", "\u26A0\uFE0F Added late: "+lates.map(l=>l.name).join(", ")+" \u2014 you may need to double back.");
    } else {
      buzz(30);
      showBanner("info", (fresh[0].addedBy||"Someone")+" added "+fresh.length+" item"+(fresh.length===1?"":"s")+" while you\u2019re shopping.");
    }
    saveState();
  } else {
    // batched: at most one banner per rolling hour
    const since = fresh.filter(f=>f.addedAt>prefs.lastSeenAdd);
    if(!since.length) return;
    if(now()-(prefs.lastNotifAt||0) > 3600000){
      const who = since[0].addedBy||"Your other half";
      showBanner("info", who+" added "+since.length+" item"+(since.length===1?"":"s")+" to the list.");
      prefs.lastNotifAt = now(); savePrefs();
      buzz(20);
    }
  }
}
function showBanner(kind,msg){
  const host = $("#bannerHost");
  const b = document.createElement("div");
  b.className = "banner"+(kind==="late"?" late":"");
  b.innerHTML = '<span>'+esc(msg)+'</span><button class="dismiss">\u2715</button>';
  b.querySelector(".dismiss").onclick = ()=>{ b.remove(); prefs.lastSeenAdd=now(); savePrefs(); };
  host.appendChild(b);
  while(host.children.length>2) host.firstChild.remove();
}

/* =========================================================
   Regulars — most-bought items as one-tap chips
========================================================= */
function computeRegulars(){
  const scored=[];
  Object.entries(know.mem).forEach(([k,m])=>{
    if(!m || !m.hist || !m.hist.length) return;
    const count = m.hist.length;
    const recency = m.last ? Math.max(0, 40 - daysAgo(m.last)) : 0;
    const score = count*10 + recency;
    // find canonical display name/emoji from dictionary if we have it
    const e = ENTRIES.find(x=>norm(x.name)===k);
    const name = e ? e.name : (k.charAt(0).toUpperCase()+k.slice(1));
    scored.push({key:k, name, emoji:e?e.emoji:"\u{1F6D2}", score, count});
  });
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,12);
}
function renderRegulars(){
  const wrap = $("#regWrap");
  const regs = computeRegulars();
  if(regs.length<3){ wrap.innerHTML=""; return; }  // needs a little history first
  const onList = new Set(liveItems().filter(i=>!i.checked).map(i=>norm(i.name)));
  wrap.innerHTML =
    '<div class="reghead">\u2B50 Your regulars</div>'+
    '<div class="regchips">'+regs.map(r=>{
      const here = onList.has(r.key);
      return '<button data-name="'+esc(r.name)+'"'+(here?' class="on"':'')+'>'+r.emoji+' '+esc(r.name)+(here?' \u2713':'<span class="add">+</span>')+'</button>';
    }).join("")+'</div>';
  wrap.querySelectorAll(".regchips button").forEach(b=>{
    b.onclick=()=>{
      const nm=b.dataset.name;
      const existing = liveItems().find(i=>norm(i.name)===norm(nm) && !i.checked);
      if(existing){ removeItem(existing.id); toast("Removed "+nm); }
      else { addItem(nm); toast("\u2795 "+nm); buzz(12); }
      saveState(); renderAll();
    };
  });
}

/* =========================================================
   Special Buys tab
   Catalogues drop Wednesdays & Saturdays on predictable dated
   sub-URLs of aldi.com.au/special-buys. Links are built locally
   (free, no server). Covers are optional images you save yourself,
   synced so both phones see them. No scraping, no paid calls.
========================================================= */
const MONTHS=["january","february","march","april","may","june","july","august","september","october","november","december"];
function nextCatalogueDates(){
  const out=[]; const d=new Date(); d.setHours(0,0,0,0);
  // include the most recent past drop too (it's the "current" catalogue)
  const probe = new Date(d); probe.setDate(probe.getDate()-7);
  for(let i=0;i<22 && out.length<5;i++){
    const dow = probe.getDay(); // 3=Wed, 6=Sat
    if(dow===3||dow===6){
      if(probe>=new Date(d.getTime()-6*86400000)) out.push(new Date(probe));
    }
    probe.setDate(probe.getDate()+1);
  }
  return out.slice(0,4);
}
function catURL(dt){
  const dow = dt.getDay()===3?"wed":"sat";
  return "https://www.aldi.com.au/special-buys/special-buys-"+dow+"-"+dt.getDate()+"-"+MONTHS[dt.getMonth()]+"/";
}
function specThumb(dt, key){
  const pic = know.catalog && know.catalog.pics && know.catalog.pics[key];
  const dayName = dt.getDay()===3?"Wednesday":"Saturday";
  if(pic){
    return '<div class="specthumb"><img src="'+esc(pic)+'" alt="'+dayName+' Special Buys catalogue">'+

    '<div class="sub">'+dayName+' '+dt.getDate()+' '+MONTHS[dt.getMonth()].slice(0,3)+'</div>'+

function renderSpecials(){
  const wrap = $("#specWrap");
  const dates = nextCatalogueDates();
  const today = new Date(); today.setHours(0,0,0,0);
  const cached = know.catalog;
  let html = '';
  dates.forEach(dt=>{
    const isPast = dt<=today;
    const key = dt.toISOString().slice(0,10);
    const hl = cached && cached.entries && cached.entries[key];
    html +=
    '<div class="speccard">'+
      specThumb(dt, key)+
      '<div class="spectop">'+
        '<div class="specdate"><div class="d">'+dt.getDate()+'</div><div class="m">'+MONTHS[dt.getMonth()].slice(0,3)+'</div></div>'+
        '<h3>'+(dt.getDay()===3?"Wednesday":"Saturday")+' Special Buys</h3>'+
        '<span class="when">'+(isPast?"ON NOW":"UPCOMING")+'</span>'+
      '</div>'+
      (hl && hl.length ? '<ul class="spechl">'+hl.map(x=>'<li>'+esc(x)+'</li>').join("")+'</ul>' : '')+
      '<a class="speclink" href="'+catURL(dt)+'" target="_blank" rel="noopener">Open catalogue \u2197</a>'+
    '</div>';
  });
  html += '<div class="specnote">Catalogue links follow ALDI\u2019s usual dated URL pattern \u2014 if one 404s, use the hub: '+
    '<a href="https://www.aldi.com.au/special-buys" target="_blank" rel="noopener" style="font-weight:800">aldi.com.au/special-buys</a>'+
    '<br>Tap a cover to save a catalogue thumbnail from your phone \u2014 it syncs to both of you.</div>';
  wrap.innerHTML = html;
  wrap.querySelectorAll(".setpic").forEach(b=>b.onclick=(e)=>{ e.preventDefault(); e.stopPropagation(); setCataloguePic(b.dataset.key); });
}
function setCataloguePic(key){
  const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f) return;
    const img=new Image();
    img.onload=()=>{
      // downscale to a small cover so the synced record stays tiny
      const c=document.createElement("canvas");
      const W=520, sc=Math.min(1,W/img.naturalWidth);
      c.width=Math.round(img.naturalWidth*sc); c.height=Math.round(img.naturalHeight*sc);
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      const url=c.toDataURL("image/jpeg",0.7);
      know.catalog = know.catalog || {};
      know.catalog.pics = know.catalog.pics || {};
      know.catalog.pics[key]=url;
      know.catalog.updatedAt=now();
      saveState(); renderSpecials(); toast("Cover saved");
    };
    img.src=URL.createObjectURL(f);
  };
  inp.click();
}

let wakeLock=null, shopPollTimer=null, undoStack=null, snackTimer=null;
async function grabWake(){
  try{ if("wakeLock" in navigator){ wakeLock = await navigator.wakeLock.request("screen"); } }catch(e){}
}
function releaseWake(){ try{ wakeLock && wakeLock.release(); }catch(e){} wakeLock=null; }

function startShop(){
  let sess = state.session;
  if(sess && !sess.finishedAt){
    // resume (either person can take over the same session)
  } else {
    sess = {
      id:uid(), startedBy:prefs.name||"", store:"A", layoutId:activeLayout().id,
      startedAt:now(), finishedAt:null, updatedAt:now(),
      startIds: itemsFor("A").filter(i=>!i.checked).map(i=>i.id),
      currentCat:null,
    };
    liveItems().forEach(i=>{ if(i.store===sess.store){ i.skipped=false; delete i.lateFlag; i.updatedAt=now(); } });
    state.session = sess;
  }
  sess.updatedAt=now();
  saveState();
  $("#shop").classList.add("show");
  document.body.style.overflow="hidden";
  grabWake();
  clearInterval(shopPollTimer);
  shopPollTimer = setInterval(pollRemote, 4000);
  renderShop();
}
function exitShop(){
  $("#shop").classList.remove("show");
  document.body.style.overflow="";
  releaseWake();
  clearInterval(shopPollTimer);
  if(state.session){ state.session.updatedAt=now(); saveState(); }
  renderAll();
}
function sessItems(){
  const s=state.session; if(!s) return [];
  return liveItems().filter(i=>i.store===s.store);
}
function currentCatId(){
  const s=state.session; if(!s) return null;
  if(s.currentCat) return s.currentCat;
  const layout = state.layouts.find(l=>l.id===s.layoutId)||activeLayout();
  const its = sessItems();
  // infer from most recently checked item, else first section with items
  let best=null, bestAt=0;
  its.forEach(i=>{ if(i.checked && (i.updatedAt||0)>bestAt){best=i;bestAt=i.updatedAt;} });
  if(best) return best.cat;
  const first = layout.order.find(cid=>its.some(i=>i.cat===cid && !i.checked));
  return first||layout.order[0];
}
function renderShop(){
  const s=state.session;
  if(!s || s.finishedAt){ exitShop(); return; }
  const layout = state.layouts.find(l=>l.id===s.layoutId)||activeLayout();
  const its = sessItems();
  const active = its.filter(i=>!i.checked || s.startIds.includes(i.id) || i.addedAt>=s.startedAt);
  const total = active.length;
  const got = active.filter(i=>i.checked).length;
  const doneD = active.filter(i=>i.checked).reduce((x,i)=>x+(+i.price||0),0);
  const leftD = active.filter(i=>!i.checked && !i.skipped).reduce((x,i)=>x+(+i.price||0),0);
  $("#shopTitle").textContent = (s.store==="A"?"ALDI":s.store==="W"?"Woolworths":"Coles")+" \u00B7 "+layout.name;
  $("#shopProg").style.width = (total? Math.round(got/total*100):0)+"%";
  $("#ssCount").textContent = got+" of "+total;
  $("#ssDone").textContent = fmt(doneD);
  $("#ssLeft").textContent = fmt(leftD);
  $("#ssTotal").textContent = fmt(doneD+leftD);
  const cur = currentCatId();
  const body = $("#shopBody");
  body.innerHTML = "";
  const order = layout.order.filter(cid=>its.some(i=>i.cat===cid));
  for(const c of CATS) if(!order.includes(c.id) && its.some(i=>i.cat===c.id)) order.push(c.id);
  let no=0;
  order.forEach(cid=>{
    no++;
    const c = CAT_BY_ID[cid];
    const catIts = its.filter(i=>i.cat===cid);
    catIts.sort((a,b)=>(a.checked?1:0)-(b.checked?1:0));
    const remaining = catIts.filter(i=>!i.checked && !i.skipped).length;
    const allDone = remaining===0;
    const isCur = cid===cur;
    const sec = document.createElement("div");
    sec.className = "shopsec"+(isCur?" current":"")+(allDone&&!isCur?" donesec":"");
    sec.innerHTML =
      '<button class="shopsechead">'+
        '<span class="no">'+(allDone?"\u2713":no)+'</span>'+
        '<h3>'+c.e+' '+esc(c.n)+'</h3>'+
        '<span class="cnt">'+remaining+' left</span>'+
        (isCur?'':'<span class="here">I\u2019M HERE</span>')+
      '</button>'+
      '<div class="secitems"'+(allDone&&!isCur?' style="display:none"':'')+'></div>';
    sec.querySelector(".shopsechead").onclick = ()=>{
      state.session.currentCat = cid; state.session.updatedAt=now();
      const si = sec.querySelector(".secitems");
      si.style.display = si.style.display==="none"?"":si.style.display; // reveal collapsed
      saveState(); renderShop();
    };
    const box = sec.querySelector(".secitems");
    catIts.forEach(it=>{
      const row = document.createElement("div");
      row.className = "shopitem"+(it.checked?" done":"")+(it.skipped?" skipped":"");
      row.innerHTML =
        '<button class="bigtick" aria-label="Collect">'+(it.checked?"\u2713":"")+'</button>'+
        '<div class="meta"><div class="iname">'+esc(it.name)+(it.qty?'<span class="qbadge">'+esc(it.qty)+'</span>':'')+'</div>'+
          '<div class="tagsrow">'+(it.meal?'<span class="mealtag">\uD83C\uDF7D '+esc(it.meal)+'</span>':"")+itemFlags(it,true)+'</div>'+
          (it.note?'<div class="notepeek">\uD83D\uDCDD '+esc(it.note)+'</div>':"")+
        '</div>'+
        (it.price>0?'<div class="price">'+fmt(it.price)+'</div>':"")+
        (!it.checked?'<button class="skipb">'+(it.skipped?"UNSKIP":"SKIP")+'</button>':"");
      row.querySelector(".bigtick").onclick = ()=>{
        it.checked = !it.checked; it.updatedAt=now();
        if(it.checked){
          it.skipped=false; delete it.lateFlag;
          recordPurchase(it.name, it.price||0);
          buzz(18);
          state.session.currentCat = it.cat; state.session.updatedAt=now();
          showUndo("\u2713 "+it.name, ()=>{ it.checked=false; it.updatedAt=now(); saveState(); renderShop(); });
        }
        saveState(); renderShop();
      };
      const sk = row.querySelector(".skipb");
      if(sk) sk.onclick = ()=>{ it.skipped=!it.skipped; it.updatedAt=now(); saveState(); renderShop(); };
      if(it.lateFlag){
        row.addEventListener("click", (e)=>{
          if(e.target.closest("button")) return;
          openLateSheet(it);
        });
      }
      box.appendChild(row);
    });
    body.appendChild(sec);
  });
  if(!order.length){
    body.innerHTML = '<div class="empty"><b>Nothing to shop here.</b><br>Add items to this store\u2019s list first.</div>';
  }
}

function finishShop(){
  const s=state.session; if(!s) return;
  const missed = sessItems().filter(i=>!i.checked && (s.startIds.includes(i.id)||i.addedAt>=s.startedAt));
  const skipped = missed.filter(i=>i.skipped);
  const unchecked = missed.filter(i=>!i.skipped);
  openSheetHtml(
    '<div class="sheethead"><div class="emo">\u{1F9FE}</div><h3>Before you finish</h3></div>'+
    (missed.length===0
      ? '<p style="font-size:16px;margin-bottom:12px">\u{1F389} Everything collected \u2014 clean sweep!</p>'
      : ('<p style="font-size:15px;margin-bottom:10px;color:var(--ink-soft)">Still needed:</p>'+
        '<div style="margin-bottom:12px">'+
        missed.map(i=>'<div class="revline"><span>'+i.emoji+'</span><div class="raw">'+esc(i.name)+
          (i.skipped?'<small>skipped</small>':'<small>not ticked</small>')+'</div></div>').join("")+'</div>'))+
    '<button class="bigact orange" id="finGo">Finish shop'+(missed.length?" \u2014 keep "+missed.length+" on the list":"")+'</button>'+
    '<button class="ghostact" id="finBack">Keep shopping</button>'
  );
  $("#finBack").onclick=()=>closeSheetPlain();
  $("#finGo").onclick=()=>{
    s.finishedAt=now(); s.updatedAt=now();
    sessItems().forEach(i=>{ i.skipped=false; delete i.lateFlag; });
    saveState(); closeSheetPlain(); exitShop();
    setTimeout(()=>offerReceipt(), 350);
  };
}

function openLayoutEditor(id){
  const l = state.layouts.find(x=>x.id===id); if(!l) return;
  const rows = l.order.filter(c=>CAT_BY_ID[c]).map((cid,i)=>{
    const c=CAT_BY_ID[cid];
    return '<div class="layrow" data-cid="'+cid+'">'+
      '<span class="handle">\u2630</span>'+
      '<span class="nm">'+c.e+' '+esc(c.n)+(l.notes[cid]?'<span class="locnote">\u{1F4CD} '+esc(l.notes[cid])+'</span>':'')+'</span>'+
      '<button class="mv up">\u25B2</button><button class="mv dn">\u25BC</button>'+
    '</div>';
  }).join("");
  openSheetHtml(
    '<div class="sheethead"><div class="emo">\u{1F6D2}</div><h3>'+esc(l.name)+'</h3></div>'+
    '<div class="hint" style="margin:-8px 0 12px">Drag \u2630 (or use \u25B2\u25BC) into the order you walk the store. Tap a section name to add a location note like \u201Caisle 3, right side\u201D.</div>'+
    '<div class="laylist" id="layList">'+rows+'</div>'+
    '<div class="rowbtns">'+
      '<button id="layUse">\u2705 Use this layout '+(l.id===state.activeLayout?"<b>(current)</b>":"")+'</button>'+
      '<button id="layRen">\u270F\uFE0F Rename</button>'+
      (state.layouts.filter(x=>!x.deleted).length>1?'<button id="layDel" style="color:var(--red)">\u{1F5D1}\uFE0F Delete layout</button>':'')+
    '</div>'+
    '<button class="bigact" id="layDone">Done</button>'
  );
  const commit=()=>{ l.updatedAt=now(); saveState(); };
  const list=$("#layList");
  const orderFromDom=()=>{ l.order=[...list.querySelectorAll(".layrow")].map(r=>r.dataset.cid); commit(); };
  list.querySelectorAll(".layrow").forEach(row=>{
    row.querySelector(".up").onclick=()=>{ const p=row.previousElementSibling; if(p) list.insertBefore(row,p); orderFromDom(); };
    row.querySelector(".dn").onclick=()=>{ const n=row.nextElementSibling; if(n) list.insertBefore(n,row); orderFromDom(); };
    row.querySelector(".nm").onclick=()=>{
      const cid=row.dataset.cid;
      const v=prompt("Location note for "+CAT_BY_ID[cid].n+" (blank to clear)", l.notes[cid]||"");
      if(v===null) return;
      if(v.trim()) l.notes[cid]=v.trim(); else delete l.notes[cid];
      commit(); openLayoutEditor(id);
    };
    // pointer drag
    const h=row.querySelector(".handle");
    h.addEventListener("pointerdown", e=>{
      e.preventDefault(); row.classList.add("dragging"); h.setPointerCapture(e.pointerId);
      const move=(ev)=>{
        const y=ev.clientY;
        [...list.querySelectorAll(".layrow")].forEach(other=>{
          if(other===row) return;
          const r=other.getBoundingClientRect();
          if(y>r.top && y<r.top+r.height/2) list.insertBefore(row,other);
          else if(y>r.top+r.height/2 && y<r.bottom) list.insertBefore(row,other.nextSibling);
        });
      };
      const up=()=>{ row.classList.remove("dragging"); orderFromDom();
        h.removeEventListener("pointermove",move); h.removeEventListener("pointerup",up); };
      h.addEventListener("pointermove",move); h.addEventListener("pointerup",up);
    });
  });
  $("#layUse").onclick=()=>{ state.activeLayout=l.id; commit(); renderAll(); openLayoutEditor(id); };
  $("#layRen").onclick=()=>{ const v=prompt("Rename layout", l.name); if(v){ l.name=v.trim(); commit(); openLayoutEditor(id); } };

/* =========================================================
   Receipt scanning — Tesseract.js, fully on-device, free
========================================================= */
let rcImages=[]; // [{canvas, dataURL}]
let tessP=null;
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  if(tessP) return tessP;
  tessP = new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    s.onload=res; s.onerror=()=>rej(new Error("Couldn't load the OCR library — check your connection"));
    document.head.appendChild(s);
  });
  return tessP;
}
function preprocess(img, rot){
  const max=1600;
  let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
  const sc=Math.min(1, max/Math.max(w,h));
  w=Math.round(w*sc); h=Math.round(h*sc);
  const c=document.createElement("canvas");
  const rotated = (rot%180)!==0;
  c.width = rotated?h:w; c.height = rotated?w:h;
  const x=c.getContext("2d");
  x.translate(c.width/2,c.height/2); x.rotate(rot*Math.PI/180);
  x.drawImage(img,-w/2,-h/2,w,h);
  // greyscale + gentle contrast stretch (avoid overprocessing)
  const d=x.getImageData(0,0,c.width,c.height), p=d.data;
  let lo=255, hi=0;
  for(let i=0;i<p.length;i+=4){ const g=(p[i]*0.3+p[i+1]*0.59+p[i+2]*0.11); if(g<lo)lo=g; if(g>hi)hi=g; }
  const rng=Math.max(40,hi-lo);
  for(let i=0;i<p.length;i+=4){
    let g=(p[i]*0.3+p[i+1]*0.59+p[i+2]*0.11);
    g=Math.max(0,Math.min(255,(g-lo)*255/rng));
    p[i]=p[i+1]=p[i+2]=g;
  }
  x.putImageData(d,0,0);
  return c;
}

  rcImages=[];

    '<div class="rcthumbs" id="rcThumbs">'+rcImages.map((im,i)=>
      '<div class="th"><img src="'+im.dataURL+'"><button class="rx" data-i="'+i+'">\u2715</button></div>').join("")+'</div>'+
    '<div class="rowbtns">'+
      '<button id="rcCam">\u{1F4F7} Take photo</button>'+

async function runOCR(){
  openSheetHtml('<div class="sheethead"><div class="emo">\u{1F50D}</div><h3>Reading receipt\u2026</h3></div>'+
    '<div class="progressnote" id="rcProg">Loading OCR\u2026</div>');
  try{
    await loadTesseract();
    let all="";
    for(let i=0;i<rcImages.length;i++){
      $("#rcProg").textContent="Reading image "+(i+1)+" of "+rcImages.length+"\u2026";
      const res = await Tesseract.recognize(rcImages[i].canvas, "eng", {
        logger:m=>{ if(m.status==="recognizing text") $("#rcProg").textContent="Reading image "+(i+1)+" \u2014 "+Math.round(m.progress*100)+"%"; }
      });
      all += res.data.text+"\n";
    }
    const lines = parseReceipt(all);
    openReceiptReview(lines, all, false);
  }catch(e){
    openSheetHtml('<div class="sheethead"><div class="emo">\u26A0\uFE0F</div><h3>OCR didn\u2019t work</h3></div>'+
      '<p style="font-size:15px;color:var(--ink-soft);margin-bottom:12px">'+esc(e.message||"Unknown error")+'. You can still enter lines manually.</p>'+
      '<button class="bigact" id="rcMan2">\u270F\uFE0F Enter manually</button>'+
      '<button class="ghostact" id="rcBack">Back</button>');
    $("#rcMan2").onclick=()=>openReceiptReview([],"",true);
    $("#rcBack").onclick=()=>renderReceiptCapture();
  }
}
/* AU receipt parsing: rules + patterns, no AI */
const RC_EXCLUDE = /(eftpos|visa|mastercard|debit|credit|card|approved|auth|abn|subtotal|sub total|total|cash|change|gst|tax invoice|invoice|rounding|loyalty|savings|transaction|terminal|merchant|receipt|store\s?#|qty\s|thank|welcome|aldi stores|\*{3,})/i;
function fixOCR(s){
  return s.replace(/[|]/g,"I").replace(/(?<=\d)[oO]/g,"0").replace(/[oO](?=\d)/g,"0")
          .replace(/(?<=\d)[lI]/g,"1").replace(/[S](?=\d\.\d)/g,"5");
}
function parseReceipt(text){
  const out=[];
  let total=null, date=null;
  const dm = text.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if(dm){ const y=dm[3].length===2?("20"+dm[3]):dm[3]; date=new Date(+y, +dm[2]-1, +dm[1]).getTime()||null; }
  const tm = text.match(/total\s*\$?\s*(\d+\.\d{2})/i);
  if(tm) total=parseFloat(tm[1]);
  text.split(/\n/).forEach(raw=>{
    let line=fixOCR(raw.trim());
    if(line.length<3) return;
    if(RC_EXCLUDE.test(line)) return;
    // qty pattern: "2 @ 3.49"
    let qty=1, price=null;
    const q = line.match(/(\d+)\s*[@x]\s*\$?(\d+\.\d{2})/i);
    const kg = line.match(/(\d+\.\d{2,3})\s*kg/i);
    const pm = line.match(/\$?(\d+\.\d{2})\s*[A-Z*]?\s*$/);
    if(q){ qty=+q[1]; price=+q[2]*qty; }
    else if(pm){ price=+pm[1]; }
    if(price===null || price<=0 || price>500) return;
    let desc=line.replace(/\$?\d+\.\d{2,3}\s*(kg)?/gi,"").replace(/\d+\s*[@x]\s*/i,"").replace(/[A-Z*]\s*$/,"").trim();
    desc=desc.replace(/\s{2,}/g," ");
    if(desc.length<2) return;
    const disc = /disc|less|saving|-\s*\$?\d/.test(line.toLowerCase()) || /^-/.test(line);
    out.push({desc, qty, price:disc?-Math.abs(price):price, weighted:!!kg, disc});
  });
  return Object.assign(out,{__total:total,__date:date});
}
/* alias + fuzzy matching for review */
function aliasKey(desc){ return norm(desc).replace(/[^a-z0-9 ]/g,""); }
function matchLine(desc){
  const ak = aliasKey(desc);
  const al = know.aliases[ak];
  if(al && al.itemName) return {name:al.itemName, conf:"hi", via:"alias"};
  const m = findMatch(desc);
  if(m) return {name:m.name, conf:"md", via:"dict"};
  // token fuzzy: best overlap with dictionary + current list
  const tokens = ak.split(" ").filter(t=>t.length>2);
  let best=null,bestScore=0;
  const cands = ENTRIES.map(e=>e.name).concat(liveItems().map(i=>i.name));
  cands.forEach(nm=>{
    const nt=norm(nm).split(" ");
    let s=0; tokens.forEach(t=>{ if(nt.some(w=>w.startsWith(t.slice(0,4)))) s++; });
    if(s>bestScore){bestScore=s;best=nm;}
  });
  if(best && bestScore>=1) return {name:best, conf:"lo", via:"fuzzy"};
  return {name:"", conf:"lo", via:"none"};
}
function openReceiptReview(lines, rawText, manual){
  const opts = ()=>{
    const names=[...new Set(liveItems().map(i=>i.name).concat(ENTRIES.map(e=>e.name)))].sort();
    return '<option value="">\u2014 ignore line \u2014</option><option value="__new__">\u2795 create new item</option>'+
      names.map(n=>'<option>'+esc(n)+'</option>').join("");
  };
  const rows = lines.map((L,i)=>{
    const m=matchLine(L.desc);
    L.match=m.name; L.conf=m.conf;
    return '<div class="revline" data-i="'+i+'">'+
      '<div class="raw"><input type="text" class="d" value="'+esc(L.desc)+'" style="width:100%;border:0;font-weight:700;font-size:14px">'+
      '<small>'+(L.qty>1?("qty "+L.qty+" \u00B7 "):"")+(L.disc?"discount \u00B7 ":"")+'<span class="conf '+m.conf+'">'+(m.conf==="hi"?"KNOWN":m.conf==="md"?"LIKELY":"CHECK")+'</span></small></div>'+
      '<select>'+opts()+'</select>'+
      '<input class="p" type="number" step="0.01" value="'+L.price.toFixed(2)+'">'+
    '</div>';
  }).join("");
  openSheetHtml(
    '<div class="sheethead"><div class="emo">\u{1F9FE}</div><h3>'+(manual?"Enter receipt":"Check the matches")+'</h3></div>'+
    (manual?'':'<div class="hint" style="margin:-8px 0 10px">Nothing saves until you confirm. Fix any line, pick the right item, or ignore junk lines.</div>')+
    '<div id="revRows">'+rows+'</div>'+
    '<button class="ghostact" id="revAdd">\u2795 Add a line</button>'+
    '<div class="field" style="margin-top:12px"><label>Receipt total (optional)</label>'+
      '<div class="pricerow"><span>$</span><input id="revTotal" type="number" step="0.01" value="'+(lines.__total!=null?lines.__total.toFixed(2):"")+'"></div></div>'+
    (rawText?'<div class="field"><label>Raw OCR text (editable reference)</label><textarea class="ocrbox">'+esc(rawText.trim())+'</textarea></div>':'')+
    '<button class="bigact orange" id="revSave">Confirm &amp; learn prices</button>'+
    '<button class="ghostact" id="revCancel">Cancel</button>'
  );
  // preselect suggested matches
  document.querySelectorAll("#revRows .revline").forEach(row=>{
    const i=+row.dataset.i;
    if(lines[i] && lines[i].match) row.querySelector("select").value=lines[i].match;
  });
  $("#revAdd").onclick=()=>{
    lines.push({desc:"", qty:1, price:0});
    openReceiptReview(lines, rawText, manual);
  };
  $("#revCancel").onclick=()=>closeSheetPlain();
  $("#revSave").onclick=()=>{
    let saved=0, sum=0;
    document.querySelectorAll("#revRows .revline").forEach(row=>{
      const i=+row.dataset.i; const L=lines[i]; if(!L) return;
      const desc=row.querySelector(".d").value.trim();
      let pick=row.querySelector("select").value;
      const price=parseFloat(row.querySelector(".p").value);
      if(!pick || isNaN(price)) return;
      if(pick==="__new__"){
        if(!desc) return;
        pick = desc.charAt(0).toUpperCase()+desc.slice(1);
      }
      // save alias
      const ak=aliasKey(desc);
      if(desc){
        const a=know.aliases[ak]||{firstAt:now(),count:0};
        know.aliases[ak]={raw:desc,itemName:pick,count:(a.count||0)+1,firstAt:a.firstAt,lastAt:now(),manual:true,updatedAt:now()};
      }
      if(price>0){
        const m=getMem(pick)||{};
        const hist=(m.hist||[]).slice(-19);
        hist.push({d:lines.__date||now(), p:Math.round(price/Math.max(1,L.qty||1)*100)/100, q:L.qty||1, store:"A", rc:true});
        touchMem(pick,{last:lines.__date||now(),hist});
        const it=liveItems().find(x=>norm(x.name)===norm(pick));
        if(it){ it.price=Math.round(price/Math.max(1,L.qty||1)*100)/100; it.priceSrc="paid today"; it.updatedAt=now(); }
        sum+=price; saved++;
      }
    });
    const rt=parseFloat($("#revTotal").value);
    let cmp="";
    const est = (state.session && state.session.finishedAt) ? null : null;
    if(!isNaN(rt) && sum>0){
      const diff=rt-sum;
      cmp=" \u00B7 receipt total "+fmt(rt)+" ("+(diff>=0?"+":"")+fmt(diff).replace("$","$")+" vs itemised)";
    }
    saveState(); renderAll(); closeSheetPlain();
    toast(saved?("Learned "+saved+" price"+(saved===1?"":"s")+cmp):"Nothing confirmed");
    if(saved) setTimeout(askClearTicked, 400);
  };
}

/* =========================================================
   Plated bridge
========================================================= */
function importPlatedPayload(p){
  const items=[]; 
  (p.items||[]).forEach(x=>{ if(x&&x.name) items.push({name:x.name, meal:x.meal||"", qty:x.quantity||""}); });
  (p.meals||[]).forEach(m=>{ (m.ingredients||m.ings||[]).forEach(g=>{
    const nm = typeof g==="string"?g:(g.name||"");
    if(nm) items.push({name:nm, meal:m.name||"", qty:(g.quantity||g.qty||"")});
  }); });
  if(!items.length){ toast("No items found in that payload"); return false; }
  openSheetHtml(
    '<div class="sheethead"><div class="emo">\u{1F37D}\uFE0F</div><h3>Import from Plated</h3></div>'+
    '<div class="hint" style="margin:-8px 0 10px">Untick anything you don\u2019t want. Items land in the right aisle automatically.</div>'+
    '<div>'+items.map((x,i)=>'<div class="revline"><input type="checkbox" checked data-i="'+i+'" style="width:22px;height:22px">'+
      '<div class="raw">'+esc(x.name)+(x.qty?'<small>'+esc(x.qty)+'</small>':'')+(x.meal?'<small>\uD83C\uDF7D '+esc(x.meal)+'</small>':'')+'</div></div>').join("")+'</div>'+
    '<button class="bigact" id="plGo">Add selected to list</button>'+
    '<button class="ghostact" id="plNo">Cancel</button>'
  );
  $("#plNo").onclick=()=>closeSheetPlain();
  $("#plGo").onclick=()=>{
    let n=0;
    document.querySelectorAll('#sheet input[type=checkbox]:checked').forEach(cb=>{
      const x=items[+cb.dataset.i];
      const it=addItem(x.name, x.meal, {});
      if(it && x.qty){ it.note = (it.note?it.note+" \u00B7 ":"")+x.qty; it.updatedAt=now(); }
      n++;
    });
    saveState(); renderAll(); closeSheetPlain();
    toast("Imported "+n+" item"+(n===1?"":"s")+" from Plated");
  };
  return true;
}
function openPlatedImport(){
  openSheetHtml(
    '<div class="sheethead"><div class="emo">\u{1F37D}\uFE0F</div><h3>Import from Plated</h3></div>'+
    '<div class="field"><label>Paste Plated export (JSON) or one item per line</label>'+
      '<textarea id="plPaste" style="min-height:110px" placeholder=\'{"version":1,"items":[{"name":"Chicken breast","meal":"Curry"}]}\nor just:\nchicken breast\nrice\'></textarea></div>'+
    '<button class="bigact" id="plParse">Review import</button>'+
    '<button class="ghostact" id="plFile">\u{1F4C2} Or choose a JSON file</button>'
  );
  $("#plParse").onclick=()=>{
    const t=$("#plPaste").value.trim(); if(!t) return;
    try{ importPlatedPayload(JSON.parse(t)); }
    catch(e){
      const items=t.split(/\n/).map(s=>s.trim()).filter(Boolean).map(name=>({name}));
      importPlatedPayload({items});
    }
  };
  $("#plFile").onclick=()=>{
    const inp=document.createElement("input"); inp.type="file"; inp.accept="application/json";
    inp.onchange=()=>{ const f=inp.files[0]; if(f) f.text().then(t=>{ try{importPlatedPayload(JSON.parse(t));}catch(e){toast("Couldn\u2019t read that file");} }); };
    inp.click();
  };
}
/* shared-origin handoff: Plated drops a payload into localStorage */
function checkPlatedHandoff(){
  try{
    const raw = localStorage.getItem("plated-grocery-export");
    if(!raw) return;
    const p = JSON.parse(raw);
    localStorage.removeItem("plated-grocery-export");
    setTimeout(()=>importPlatedPayload(p), 600);
  }catch(e){}
}
/* JS bridge for same-page embedding */
window.AldiRunBridge = {
  importItems: (items)=>importPlatedPayload({items:items||[]}),
  importMeal:  (meal)=>importPlatedPayload({meals:[meal]}),
  exportCurrentList: ()=>liveItems().map(i=>({name:i.name, checked:i.checked, store:i.store, meal:i.meal, price:i.price})),
};
/* postMessage bridge with origin validation */
window.addEventListener("message", (e)=>{
  if(!BRIDGE_ORIGINS.includes(e.origin)) return;
  const d=e.data;
  if(d && d.type==="ALDI_RUN_IMPORT" && d.version===1){ importPlatedPayload(d); }
});
